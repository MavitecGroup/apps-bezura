name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail
            REPO="${{ secrets.DEPLOY_REPO_PATH }}"
            if [ -z "$REPO" ]; then REPO=/home/vinicius/avisos-bezura; fi
            if [ ! -d "$REPO/.git" ]; then
              echo "::error::Repositório não encontrado em $REPO — clone o repo ou defina o secret DEPLOY_REPO_PATH."
              exit 1
            fi
            cd "$REPO"
            git stash push -u -m "auto-deploy-stash-$(date +%Y%m%d-%H%M%S)" || true
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            git rev-parse --short HEAD
            docker compose -f infra/docker-compose.vps.yml up -d --build
            docker compose -f infra/docker-compose.vps.yml up -d --force-recreate apps-bezura

      - name: Validar produção (painel + assets)
        env:
          PUBLIC_ORIGIN: https://apps.logzap.com.br
        run: |
          set -euo pipefail
          dns_ip=$(getent ahosts apps.logzap.com.br | awk '/STREAM/{print $1; exit}')
          echo "DNS apps.logzap.com.br → ${dns_ip:-desconhecido}"
          echo "SSH_HOST nos secrets deve ser esse IP — senão o CI atualiza outra máquina e o site público não muda."
          curl -sfS -o /dev/null --max-time 25 "$PUBLIC_ORIGIN/modal/"
          curl -sfS -o /dev/null --max-time 25 "$PUBLIC_ORIGIN/avisos-recorrente.png"
          root=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 25 "$PUBLIC_ORIGIN/")
          echo "GET / → HTTP $root (com nginx atual do repo deve ser 200 — sem redirect)"
          if [ "$root" != "200" ]; then
            echo "::warning::Raiz não retorna 200 — veja README (alinhamento DNS × SSH_HOST) ou aplique manualmente infra/nginx/cadastro-site.conf no servidor do DNS."
          fi
