# Traefik termina TLS e encaminha HTTP ao container; $scheme no Nginx fica "http".
map $http_x_forwarded_proto $effective_scheme {
    https https;
    http http;
    default $scheme;
}

server {
    listen       80;
    listen  [::]:80;
    # Por trás do Traefik qualquer Host válido deve cair aqui (evita mismatch com server_name fixo).
    server_name _;

    # Document root único para / e /modal/
    root /usr/share/nginx/html;
    index index.html;

    # /modal -> /modal/
    location = /modal {
        return 301 $effective_scheme://$host/modal/;
    }

    # Raiz canônica do painel (ex.: https://apps.logzap.com.br/) — mesmo HTML que /modal/, sem redirect na barra de URL.
    location = / {
        rewrite ^ /modal/index.html last;
    }

    # Diretório /modal/ sem arquivo explícito: garante index (evita 404 em alguns setups com try_files).
    location = /modal/ {
        rewrite ^ /modal/index.html last;
    }

    # Painel e estáticos sob /modal/
    location ^~ /modal/ {
        try_files $uri $uri/ /modal/index.html;
    }

    # Compatibilidade com chamadas antigas de ícone/logo para evitar 404 no navegador.
    location = /favicon.ico {
        try_files /avisos-recorrente.png =404;
    }

    location = /logan-logo.png {
        try_files /avisos-recorrente.png =404;
    }

    # Demais arquivos estáticos na raiz (ex.: avisos-recorrente.png).
    location / {
        try_files $uri =404;
    }
}
