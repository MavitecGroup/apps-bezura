server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # /modal e /modal/ — alias evita ambiguidade com try_files no subpath
    location = /modal {
        return 301 /modal/;
    }

    # A raiz sempre aponta para o app em /modal para evitar descompasso de mount de arquivo.
    location = / {
        return 302 /modal/;
    }

    location ^~ /modal/ {
        alias /usr/share/nginx/html/modal/;
        index index.html;
    }

    location / {
        try_files $uri =404;
    }
}
