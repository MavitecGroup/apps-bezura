<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bezura | Biblioteca de Apps</title>
  <link rel="icon" type="image/png" href="../logan-logo.png" />
  <style>
    /* DESIGN TOKENS */
    :root {
      --bg-dark: #0a1737;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-hover: rgba(255, 255, 255, 0.15);
      --text: #ffffff;
      --text-muted: #cbd5e1;
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.5);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 18%, rgba(56, 189, 248, 0.18), transparent 36%),
        radial-gradient(circle at 84% 20%, rgba(59, 130, 246, 0.22), transparent 34%),
        radial-gradient(circle at 72% 80%, rgba(14, 116, 144, 0.2), transparent 38%),
        linear-gradient(140deg, #0a1737 0%, #0c1f49 34%, #102a5f 66%, #0a1a3d 100%);
      background-size: 180% 180%;
      animation: gradientShift 18s ease-in-out infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* BACKGROUND ANIMATIONS */
    body::before {
      content: "";
      position: fixed;
      inset: -20% -10%;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(closest-side, rgba(37, 99, 235, 0.2), transparent 72%) 10% 24% / 34% 34% no-repeat,
        radial-gradient(closest-side, rgba(59, 130, 246, 0.17), transparent 72%) 82% 16% / 26% 26% no-repeat,
        radial-gradient(closest-side, rgba(30, 64, 175, 0.14), transparent 72%) 74% 76% / 31% 31% no-repeat,
        radial-gradient(closest-side, rgba(96, 165, 250, 0.12), transparent 72%) 28% 84% / 23% 23% no-repeat;
      filter: blur(12px);
      animation: blobsFloat 18s ease-in-out infinite alternate;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      opacity: 0.6;
      animation: floatUp linear infinite;
    }

    /* LIBRARY LAYOUT */
    .app-library {
      width: min(100%, 800px);
      padding: 30px;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: center;
    }

    .library-header {
      margin-bottom: 40px;
    }

    .library-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .library-header p {
      color: var(--text-muted);
      margin: 8px 0 0;
      font-size: 0.95rem;
    }

    /* APP GRID */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 20px;
      padding: 10px;
      overflow-y: auto;
      max-height: 80vh;
    }

    /* GLASS CARD */
    .app-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      width: 160px;
      height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-decoration: none;
      color: inherit;
      padding: 16px;
    }

    .app-card:hover {
      background: var(--glass-hover);
      border-color: var(--primary);
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2), 0 0 15px var(--primary-glow);
    }

    .app-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), #60a5fa);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
      transition: transform 0.3s ease;
    }

    .app-card:hover .app-icon {
      transform: scale(1.1) rotate(5deg);
      animation: pulseGlow 1.5s infinite;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3); }
      50% { box-shadow: 0 8px 30px rgba(59, 130, 246, 0.6); }
      100% { box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3); }
    }

    .app-icon svg {
      width: 24px;
      height: 24px;
      color: white;
    }

    .app-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .app-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: none; /* Inicia oculto, aparece no hover se quiser */
    }

    /* CUSTOM SCROLLBAR */
    .app-grid::-webkit-scrollbar {
      width: 6px;
    }
    .app-grid::-webkit-scrollbar-track {
      background: transparent;
    }
    .app-grid::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    /* ANIMATIONS */
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes blobsFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(3%, -2%) scale(1.05); }
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) scale(0.2); opacity: 0; }
      30% { opacity: 0.5; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* RESPONSIVENESS */
    @media (max-width: 480px) {
      .app-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
      .app-library {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="particles"></div>

  <main class="app-library">
    <header class="library-header">
      <h1>Minha Biblioteca</h1>
      <p>Selecione uma ferramenta para começar</p>
    </header>

    <div class="app-grid">
      <!-- AVISOS INTERNOS -->
      <a href="#" class="app-card">
        <div class="app-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
        </div>
        <span class="app-name">Avisos Internos</span>
        <span class="app-desc">Gerencie comunicados para atendentes</span>
      </a>
    </div>
  </main>

  <script>
    function createParticles() {
      const particleContainer = document.getElementById("particles");
      const particleCount = 60;

      for (let i = 0; i < particleCount; i++) {
        const p = document.createElement("div");
        p.classList.add("particle");

        const size = Math.random() * 4 + 1;
        const left = Math.random() * 100;
        const duration = Math.random() * 10 + 10;
        const delay = Math.random() * 10;

        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.left = `${left}%`;
        p.style.animationDuration = `${duration}s`;
        p.style.animationDelay = `-${delay}s`;

        particleContainer.appendChild(p);
      }
    }

    createParticles();
  </script>
</body>
</html>
