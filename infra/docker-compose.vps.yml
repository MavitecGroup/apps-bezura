services:
  cadastro-site:
    image: nginx:alpine
    container_name: cadastro-site
    restart: unless-stopped
    volumes:
      - ../infra/nginx/cadastro-site.conf:/etc/nginx/conf.d/default.conf:ro
      - ../web/modal/index.html:/usr/share/nginx/html/index.html:ro
      - ../web/logan-logo.png:/usr/share/nginx/html/logan-logo.png:ro
      - ../web/logan-technology-logomarca-.png:/usr/share/nginx/html/logan-technology-logomarca-.png:ro
      - ../web/modal:/usr/share/nginx/html/modal:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      - traefik.http.routers.cadastro-site.rule=Host(`apps.logzap.com.br`)
      - traefik.http.routers.cadastro-site.entrypoints=web,websecure
      - traefik.http.routers.cadastro-site.tls=true
      - traefik.http.routers.cadastro-site.tls.certresolver=mytlschallenge
      - traefik.http.routers.cadastro-site.priority=10
      - traefik.http.services.cadastro-site.loadbalancer.server.port=80
    networks:
      - n8n_default

networks:
  n8n_default:
    external: true
